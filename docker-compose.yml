services:
  zjadmin:
    image: zjadmin:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zjadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Persistent SQLite database
      - zjadmin-db:/app/Data
      # Persistent logs
      - zjadmin-logs:/app/logs
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Data Source=Data/ZJAdmin.db

volumes:
  zjadmin-db:
  zjadmin-logs:
